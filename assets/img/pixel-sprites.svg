<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" style="display:none">
  <defs>
    <!-- 픽셀 캐릭터 스프라이트 -->
    <symbol id="sprite-character" viewBox="0 0 32 40">
      <!-- 머리 -->
      <rect x="8" y="0" width="16" height="14" fill="#f5c5a3"/>
      <rect x="6" y="2" width="2" height="10" fill="#f5c5a3"/>
      <rect x="24" y="2" width="2" height="10" fill="#f5c5a3"/>
      <!-- 눈 -->
      <rect x="11" y="4" width="4" height="4" fill="#1a1a2e"/>
      <rect x="17" y="4" width="4" height="4" fill="#1a1a2e"/>
      <!-- 눈 하이라이트 -->
      <rect x="12" y="5" width="1" height="1" fill="white"/>
      <rect x="18" y="5" width="1" height="1" fill="white"/>
      <!-- 입 -->
      <rect x="12" y="10" width="8" height="2" fill="#c0392b"/>
      <!-- 몸 -->
      <rect x="7" y="14" width="18" height="16" fill="#0f3460"/>
      <!-- AI 배지 -->
      <rect x="11" y="18" width="10" height="6" fill="#ffd700" opacity="0.3"/>
      <rect x="12" y="19" width="8" height="4" fill="none" stroke="#ffd700" stroke-width="1"/>
      <!-- 팔 -->
      <rect x="3" y="14" width="4" height="12" fill="#0f3460"/>
      <rect x="25" y="14" width="4" height="12" fill="#0f3460"/>
      <!-- 다리 -->
      <rect x="9" y="30" width="6" height="10" fill="#1a3a6e"/>
      <rect x="17" y="30" width="6" height="10" fill="#1a3a6e"/>
    </symbol>

    <!-- 책 스프라이트 -->
    <symbol id="sprite-book" viewBox="0 0 24 24">
      <rect x="2" y="2" width="20" height="20" fill="#ff6b9d" opacity="0.8"/>
      <rect x="2" y="2" width="4" height="20" fill="#c0392b"/>
      <rect x="8" y="6" width="10" height="2" fill="white" opacity="0.7"/>
      <rect x="8" y="10" width="10" height="2" fill="white" opacity="0.7"/>
      <rect x="8" y="14" width="7" height="2" fill="white" opacity="0.7"/>
    </symbol>

    <!-- 코드 스프라이트 -->
    <symbol id="sprite-code" viewBox="0 0 24 24">
      <rect width="24" height="24" fill="#0f3460"/>
      <rect x="0" y="0" width="24" height="4" fill="#00d4ff" opacity="0.5"/>
      <rect x="2" y="6" width="6" height="2" fill="#ffd700"/>
      <rect x="10" y="6" width="8" height="2" fill="#39ff14"/>
      <rect x="4" y="10" width="10" height="2" fill="#ff6b9d"/>
      <rect x="2" y="14" width="4" height="2" fill="#b44fff"/>
      <rect x="8" y="14" width="12" height="2" fill="#00d4ff"/>
      <rect x="2" y="18" width="8" height="2" fill="#ff8c42"/>
    </symbol>

    <!-- 별 스프라이트 -->
    <symbol id="sprite-star" viewBox="0 0 16 16">
      <rect x="7" y="0" width="2" height="4" fill="#ffd700"/>
      <rect x="7" y="12" width="2" height="4" fill="#ffd700"/>
      <rect x="0" y="7" width="4" height="2" fill="#ffd700"/>
      <rect x="12" y="7" width="4" height="2" fill="#ffd700"/>
      <rect x="2" y="2" width="2" height="2" fill="#ffd700"/>
      <rect x="12" y="2" width="2" height="2" fill="#ffd700"/>
      <rect x="2" y="12" width="2" height="2" fill="#ffd700"/>
      <rect x="12" y="12" width="2" height="2" fill="#ffd700"/>
      <rect x="5" y="5" width="6" height="6" fill="#ffd700"/>
    </symbol>
  </defs>
</svg>
