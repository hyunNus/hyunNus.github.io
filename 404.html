<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>404 — Hyunwoo Lee</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Noto+Sans+KR:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:      #FFF8F0;
      --border:  #D4B896;
      --text:    #3D2B1F;
      --muted:   #9B7B60;
      --accent:  #7CB87A;
      --font-pixel: 'Press Start 2P', monospace;
      --font-body:  'Noto Sans KR', sans-serif;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      overscroll-behavior: none;
    }
    nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(255,248,240,0.92);
      border-bottom: 2px solid var(--border);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
    }
    .nav-inner {
      max-width: 860px; margin: 0 auto;
      padding: 0 24px; height: 56px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .nav-logo {
      font-family: var(--font-pixel); font-size: 12px;
      color: var(--text); text-decoration: none;
    }
    .nav-links { list-style: none; display: flex; gap: 24px; }
    .nav-links a {
      font-family: var(--font-pixel); font-size: 8px;
      color: var(--muted); text-decoration: none;
      transition: color 0.2s;
      min-height: 44px; display: flex; align-items: center;
    }
    .nav-links a:hover { color: var(--text); }
    .error-page {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 40px 24px;
    }
    .error-inner { text-align: center; max-width: 480px; }
    #lost-canvas {
      display: block; margin: 0 auto 32px;
      image-rendering: pixelated;
    }
    .error-code {
      font-family: var(--font-pixel); font-size: 48px;
      color: var(--accent); margin-bottom: 16px;
      text-shadow: 3px 3px 0 var(--border);
    }
    .error-msg {
      font-family: var(--font-pixel); font-size: 11px;
      color: var(--text); margin-bottom: 12px;
      line-height: 2.2;
    }
    .error-desc {
      font-size: 14px; color: var(--muted);
      line-height: 1.8; margin-bottom: 32px;
    }
    .btn-home {
      display: inline-flex; align-items: center; gap: 8px;
      font-family: var(--font-pixel); font-size: 9px;
      background: var(--accent); color: white;
      border: none; border-radius: 6px;
      padding: 14px 24px; cursor: pointer;
      text-decoration: none;
      transition: all 0.2s;
      min-height: 44px;
    }
    .btn-home:hover { background: #5A9457; transform: translateY(-2px); }
  </style>
</head>
<body>
  <nav>
    <div class="nav-inner">
      <a href="/" class="nav-logo">Hyunwoo Lee</a>
      <ul class="nav-links">
        <li><a href="/">HOME</a></li>
        <li><a href="/pages/til/">TIL</a></li>
        <li><a href="/pages/life-os/">BOOKS</a></li>
      </ul>
    </div>
  </nav>

  <div class="error-page">
    <div class="error-inner">
      <canvas id="lost-canvas" width="120" height="120"></canvas>
      <div class="error-code">404</div>
      <div class="error-msg">Lost in the fields...</div>
      <p class="error-desc">
        This page wandered off somewhere between the crops.<br>
        Let's head back to the farm.
      </p>
      <a href="/" class="btn-home">← Back to Home</a>
    </div>
  </div>

  <script>
  (function() {
    const canvas = document.getElementById('lost-canvas');
    const ctx = canvas.getContext('2d');
    const S = 4;
    function px(x,y,w,h,c){ ctx.fillStyle=c; ctx.fillRect(x*S,y*S,w*S,h*S); }
    let frame = 0;
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      // 풀밭 배경
      px(0, 22, 30, 8, '#7CB87A');
      px(0, 22, 30, 1, '#9BD49A');
      // 물음표 말풍선
      px(14, 0, 10, 8, '#FFFDF7');
      px(14, 0, 10, 1, '#D4B896');
      px(14, 7, 10, 1, '#D4B896');
      px(14, 0, 1, 8, '#D4B896');
      px(23, 0, 1, 8, '#D4B896');
      px(17, 1, 4, 1, '#3D2B1F');
      px(20, 2, 1, 1, '#3D2B1F');
      px(18, 3, 2, 1, '#3D2B1F');
      px(18, 4, 1, 1, '#3D2B1F');
      px(18, 6, 1, 1, '#3D2B1F');
      px(16, 8, 2, 2, '#FFFDF7');
      px(15, 9, 1, 1, '#D4B896');
      // 농부 머리
      px(11, 10, 8, 7, '#F5C5A0');
      // 모자
      px(10, 8, 10, 2, '#8B4513');
      px(9, 9, 12, 1, '#A0522D');
      // 눈 (X 표정)
      px(13, 12, 1, 1, '#3D2B1F');
      px(15, 12, 1, 1, '#3D2B1F');
      px(14, 13, 1, 1, '#3D2B1F');
      px(16, 13, 1, 1, '#3D2B1F');
      // 입 (아래로)
      px(13, 15, 1, 1, '#C47A5A');
      px(14, 16, 2, 1, '#C47A5A');
      px(16, 15, 1, 1, '#C47A5A');
      // 눈물 (흘러내림)
      const tearY = 14 + (Math.floor(frame / 6) % 5);
      if(tearY < 19) px(12, tearY, 1, 1, '#87CEEB');
      // 몸통
      px(10, 17, 10, 5, '#7CB87A');
      // 팔 (축 처진)
      const armY = frame % 20 < 10 ? 18 : 19;
      px(8, armY, 2, 3, '#7CB87A');
      px(20, armY, 2, 3, '#7CB87A');
      px(8, armY+3, 2, 1, '#F5C5A0');
      px(20, armY+3, 2, 1, '#F5C5A0');
      // 다리
      px(11, 22, 3, 3, '#5A4030');
      px(16, 22, 3, 3, '#5A4030');
      frame++;
      requestAnimationFrame(draw);
    }
    draw();
  })();
  </script>
</body>
</html>
