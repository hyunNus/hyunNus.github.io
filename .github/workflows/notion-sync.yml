name: Notion Sync & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/fetch-notion.js'

jobs:
  sync-notion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GH_PAT }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./scripts

      - name: Fetch Notion data
        run: node fetch-notion.js
        working-directory: ./scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TIL_DB_ID: ${{ secrets.NOTION_TIL_DB_ID }}
          NOTION_BOOKS_DB_ID: ${{ secrets.NOTION_BOOKS_DB_ID }}

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add data/*.json
          git commit -m "Update Notion data [skip ci]" || echo "No changes to commit"
          git push origin main
