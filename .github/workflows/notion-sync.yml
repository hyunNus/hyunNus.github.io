name: Notion Sync & Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/fetch-notion.js'

jobs:
  sync-notion:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install
        working-directory: ./scripts

      - name: Fetch Notion data
        run: node fetch-notion.js
        working-directory: ./scripts
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TIL_DB_ID: ${{ secrets.NOTION_TIL_DB_ID }}
          NOTION_BOOKS_DB_ID: ${{ secrets.NOTION_BOOKS_DB_ID }}

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          personal_token: ${{ secrets.GH_PAT }}
          publish_dir: './'
          force_orphan: true
          exclude_assets: 'scripts/node_modules'
