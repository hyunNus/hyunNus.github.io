name: Notion Sync & Deploy

on:
  # 매 2시간마다 자동 동기화
  schedule:
    - cron: '0 */2 * * *'
  # 수동 트리거 — 노션 글 작성 후 즉시 배포 가능
  workflow_dispatch:
  # main 브랜치 push 시 실행
  push:
    branches: [main]
    paths-ignore:
      - 'data/**'   # 데이터 커밋이 재귀 트리거되지 않도록

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  sync-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: scripts/package.json

      - name: Install dependencies
        run: cd scripts && npm install

      - name: Fetch data from Notion
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_TIL_DB_ID: ${{ secrets.NOTION_TIL_DB_ID }}
          NOTION_BOOKS_DB_ID: ${{ secrets.NOTION_BOOKS_DB_ID }}
        run: cd scripts && node fetch-notion.js

      - name: Commit updated data
        run: |
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git config user.name  "github-actions[bot]"
          git add data/
          git diff --staged --quiet || git commit -m "chore: sync notion [$(date -u '+%Y-%m-%d %H:%M UTC')]"
          git push

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./
          exclude_assets: '.github,scripts,node_modules,*.bak'
          commit_message: 'deploy: update site [skip ci]'
