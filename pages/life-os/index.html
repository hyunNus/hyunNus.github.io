<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Books — SRE</title>
  <meta name="description" content="독서 기록. 완독, 읽는 중, 위시리스트.">
  <link rel="stylesheet" href="../../assets/css/pixel-system.css">
  <style>
    .page-header { padding: var(--gap-xl) 0 var(--gap-lg); border-bottom: 2px solid var(--border-mid); margin-bottom: var(--gap-xl); }
    .page-title { margin-bottom: var(--gap-sm); }
    .page-desc { font-size: 14px; color: var(--text-muted); }
    .controls { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--gap-md); margin-bottom: var(--gap-lg); }
    .count-text { font-family: var(--font-pixel); font-size: 9px; color: var(--text-muted); }
    .book-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: var(--gap-lg); }
    .book-card { background: var(--bg-surface); border: 2px solid var(--border-warm); border-radius: 4px; padding: var(--gap-lg); transition: all var(--transition); position: relative; cursor: pointer; }
    .book-card::after { content: ''; position: absolute; bottom: -4px; right: -4px; width: 100%; height: 100%; background: var(--border-warm); border-radius: 4px; z-index: -1; }
    .book-card:hover { border-color: var(--gold-dim); transform: translate(-1px, -1px); }
    .book-card:hover::after { background: var(--gold-dim); }
    .book-card-cover { width: 100%; height: 120px; background: var(--bg-elevated); border: 1px solid var(--border-warm); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 48px; margin-bottom: var(--gap-md); }
    .book-card-title { font-family: var(--font-pixel); font-size: 11px; color: var(--cream); margin-bottom: 6px; line-height: 1.5; }
    .book-card-author { font-size: 12px; color: var(--text-muted); margin-bottom: var(--gap-sm); }
    .book-card-footer { display: flex; align-items: center; justify-content: space-between; margin-top: var(--gap-md); }
    .book-status { font-family: var(--font-pixel); font-size: 8px; padding: 3px 8px; border: 1px solid; border-radius: 2px; }
    .status-reading  { color: var(--gold); border-color: var(--gold-dim); background: rgba(244,200,66,0.1); }
    .status-done     { color: var(--green-light); border-color: var(--green-mid); background: rgba(127,176,105,0.1); }
    .status-wishlist { color: var(--lavender); border-color: var(--lavender-dim); background: rgba(176,159,202,0.1); }
    .reading-progress { margin-top: var(--gap-sm); }
    .reading-progress-label { font-family: var(--font-pixel); font-size: 8px; color: var(--text-muted); margin-bottom: 4px; display: flex; justify-content: space-between; }
    .stats-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: var(--gap-md); margin-bottom: var(--gap-xl); }
    .stat-mini { background: var(--bg-surface); border: 2px solid var(--border-warm); border-radius: 4px; padding: var(--gap-md); text-align: center; position: relative; }
    .stat-mini::after { content: ''; position: absolute; bottom: -3px; right: -3px; width: 100%; height: 100%; background: var(--border-warm); border-radius: 4px; z-index: -1; }
    .stat-mini-num { font-family: var(--font-pixel); font-size: 24px; color: var(--gold); display: block; margin-bottom: 4px; }
    .stat-mini-label { font-family: var(--font-pixel); font-size: 8px; color: var(--text-muted); }
    .book-detail-overlay { position: fixed; inset: 0; background: rgba(10,10,20,0.9); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: center; justify-content: center; padding: var(--gap-lg); opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
    .book-detail-overlay.open { opacity: 1; pointer-events: all; }
    .book-detail { background: var(--bg-surface); border: 2px solid var(--border-warm); border-radius: 4px; width: 100%; max-width: 560px; padding: var(--gap-xl); box-shadow: 6px 6px 0 var(--earth-dark); }
    .book-detail-header { display: flex; align-items: flex-start; gap: var(--gap-lg); margin-bottom: var(--gap-lg); padding-bottom: var(--gap-lg); border-bottom: 2px solid var(--border-mid); }
    .book-detail-cover { width: 60px; height: 80px; background: var(--bg-elevated); border: 1px solid var(--border-warm); border-radius: 2px; display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; }
    .book-detail-info { flex: 1; }
    .book-detail-title { font-family: var(--font-pixel); font-size: 13px; color: var(--gold); margin-bottom: 6px; line-height: 1.5; }
    .book-detail-author { font-size: 13px; color: var(--text-muted); margin-bottom: var(--gap-sm); }
    .notion-link { font-family: var(--font-pixel); font-size: 9px; color: var(--sky-light); text-decoration: none; display: inline-flex; align-items: center; gap: 4px; padding: 4px 8px; border: 1px solid var(--sky-mid); border-radius: 2px; transition: all var(--transition); }
    .notion-link:hover { background: rgba(91,163,208,0.1); color: var(--gold); }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="../../" class="nav-logo">🌾 SRE</a>
      <ul class="nav-links">
        <li><a href="../../">HOME</a></li>
        <li><a href="../til/">TIL</a></li>
        <li><a href="./" class="active">BOOKS</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">Books</h1>
        <p class="page-desc">독서 기록 — 완독, 읽는 중, 위시리스트</p>
      </div>

      <!-- 통계 -->
      <div class="stats-row">
        <div class="stat-mini"><span class="stat-mini-num" id="stat-done">0</span><span class="stat-mini-label">완독</span></div>
        <div class="stat-mini"><span class="stat-mini-num" id="stat-reading">0</span><span class="stat-mini-label">읽는 중</span></div>
        <div class="stat-mini"><span class="stat-mini-num" id="stat-wish">0</span><span class="stat-mini-label">위시리스트</span></div>
      </div>

      <!-- 필터 탭 -->
      <div class="filter-tabs" id="status-tabs">
        <button class="filter-tab active" data-status="ALL">전체</button>
        <button class="filter-tab" data-status="읽는 중">읽는 중</button>
        <button class="filter-tab" data-status="완독">완독</button>
        <button class="filter-tab" data-status="위시리스트">위시리스트</button>
      </div>

      <!-- 장르 필터 -->
      <div class="filter-tabs" id="genre-tabs" style="margin-top: calc(-1 * var(--gap-sm));">
        <button class="filter-tab active" data-genre="ALL">전체 장르</button>
        <button class="filter-tab" data-genre="TECH">TECH</button>
        <button class="filter-tab" data-genre="DEV">DEV</button>
        <button class="filter-tab" data-genre="GROWTH">GROWTH</button>
        <button class="filter-tab" data-genre="GENERAL">GENERAL</button>
      </div>

      <!-- 컨트롤 -->
      <div class="controls">
        <span class="count-text" id="count-text">0권</span>
      </div>

      <!-- 도서 그리드 -->
      <div id="book-grid" class="book-grid"></div>
    </div>

    <footer class="footer">
      <div class="container">
        <p class="footer-text">🌾 Self-Refining Engine · Powered by Notion + GitHub Pages</p>
      </div>
    </footer>
  </div>

  <button class="scroll-top" id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <!-- 도서 상세 모달 -->
  <div class="book-detail-overlay" id="book-detail-overlay">
    <div class="book-detail">
      <div class="book-detail-header">
        <div class="book-detail-cover" id="detail-cover">📖</div>
        <div class="book-detail-info">
          <div class="book-detail-title" id="detail-title"></div>
          <div class="book-detail-author" id="detail-author"></div>
          <div id="detail-meta" style="display:flex;gap:8px;flex-wrap:wrap;align-items:center;margin-top:8px;"></div>
        </div>
        <button class="modal-close" onclick="closeDetail()">✕</button>
      </div>
      <div id="detail-review" class="prose"></div>
      <div style="margin-top:var(--gap-lg);display:flex;gap:8px;">
        <a href="#" class="notion-link" id="detail-notion-link" target="_blank" style="display:none;">📝 노션에서 보기</a>
      </div>
    </div>
  </div>

  <script>
    let allItems = [];
    let currentStatus = 'ALL';
    let currentGenre = 'ALL';

    const GENRE_ICON = { 'TECH': '💻', 'DEV': '⚙️', 'GROWTH': '🌱', 'GENERAL': '📖' };
    const STATUS_CLASS = { '읽는 중': 'status-reading', '완독': 'status-done', '위시리스트': 'status-wishlist' };

    function getFiltered() {
      let items = [...allItems];
      if (currentStatus !== 'ALL') items = items.filter(i => i.status === currentStatus);
      if (currentGenre !== 'ALL') items = items.filter(i => i.genre === currentGenre);
      return items;
    }

    function renderStars(rating) {
      if (!rating) return '';
      return Array.from({length:5}, (_,i) =>
        '<span class="star' + (i < rating ? ' filled' : '') + '">★</span>'
      ).join('');
    }

    function render() {
      const items = getFiltered();
      const container = document.getElementById('book-grid');
      document.getElementById('count-text').textContent = items.length + '권';

      if (items.length === 0) {
        if (allItems.length === 0) {
          container.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <span class="empty-icon">📚</span>
              <p class="empty-title">아직 독서 기록이 없어요</p>
              <p class="empty-desc">노션 Books 데이터베이스에 책을 추가하고 Published를 체크하면<br>자동으로 여기에 나타납니다.</p>
              <a href="https://notion.so" target="_blank" class="btn btn-primary">노션에서 추가하기</a>
            </div>`;
        } else {
          container.innerHTML = `
            <div class="empty-state" style="grid-column:1/-1">
              <span class="empty-icon">🔍</span>
              <p class="empty-title">해당 조건의 책이 없어요</p>
              <p class="empty-desc">다른 필터를 선택해보세요.</p>
            </div>`;
        }
        return;
      }

      container.innerHTML = items.map(item => {
        const icon = GENRE_ICON[item.genre] || '📖';
        const statusClass = STATUS_CLASS[item.status] || 'status-wishlist';
        const stars = renderStars(item.rating);
        return `
          <div class="book-card" onclick="openDetail('${item.id}')">
            <div class="book-card-cover">${icon}</div>
            <div class="book-card-title">${item.title}</div>
            <div class="book-card-author">${item.author || ''}</div>
            ${stars ? '<div class="stars">' + stars + '</div>' : ''}
            <div class="book-card-footer">
              <span class="book-status ${statusClass}">${item.status || '위시리스트'}</span>
              ${item.genre ? '<span class="badge badge-' + item.genre.toLowerCase() + '">' + item.genre + '</span>' : ''}
            </div>
          </div>`;
      }).join('');
    }

    function updateStats() {
      document.getElementById('stat-done').textContent = allItems.filter(b => b.status === '완독').length;
      document.getElementById('stat-reading').textContent = allItems.filter(b => b.status === '읽는 중').length;
      document.getElementById('stat-wish').textContent = allItems.filter(b => b.status === '위시리스트').length;
    }

    function openDetail(id) {
      const item = allItems.find(i => i.id === id);
      if (!item) return;
      const icon = GENRE_ICON[item.genre] || '📖';
      const statusClass = STATUS_CLASS[item.status] || 'status-wishlist';
      document.getElementById('detail-cover').textContent = icon;
      document.getElementById('detail-title').textContent = item.title;
      document.getElementById('detail-author').textContent = item.author || '';
      const stars = renderStars(item.rating);
      document.getElementById('detail-meta').innerHTML =
        '<span class="book-status ' + statusClass + '">' + (item.status || '위시리스트') + '</span>' +
        (item.genre ? '<span class="badge badge-' + item.genre.toLowerCase() + '">' + item.genre + '</span>' : '') +
        (stars ? '<div class="stars">' + stars + '</div>' : '') +
        (item.pages ? '<span style="font-family:var(--font-pixel);font-size:8px;color:var(--text-muted);">' + item.pages + 'p</span>' : '');
      const reviewEl = document.getElementById('detail-review');
      if (item.review) {
        reviewEl.innerHTML = '<p>' + item.review + '</p>';
      } else {
        reviewEl.innerHTML = '<p style="color:var(--text-muted)">아직 리뷰가 없어요.</p>';
      }
      const notionLink = document.getElementById('detail-notion-link');
      if (item.url) { notionLink.href = item.url; notionLink.style.display = 'inline-flex'; }
      else { notionLink.style.display = 'none'; }
      document.getElementById('book-detail-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeDetail() {
      document.getElementById('book-detail-overlay').classList.remove('open');
      document.body.style.overflow = '';
    }

    // ── 이벤트 ──
    document.querySelectorAll('#status-tabs .filter-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#status-tabs .filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentStatus = btn.dataset.status;
        render();
      });
    });

    document.querySelectorAll('#genre-tabs .filter-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('#genre-tabs .filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentGenre = btn.dataset.genre;
        render();
      });
    });

    document.getElementById('book-detail-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeDetail();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeDetail();
    });

    window.addEventListener('scroll', () => {
      document.getElementById('scroll-top').classList.toggle('visible', window.scrollY > 300);
    });

    // ── 데이터 로드 ──
    async function loadData() {
      try {
        const res = await fetch('../../data/books.json');
        const data = await res.json();
        allItems = data.items || [];
        updateStats();
        render();
      } catch(err) {
        allItems = [];
        render();
      }
    }

    loadData();
  </script>
</body>
</html>
