<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TIL — SRE</title>
  <meta name="description" content="Today I Learned. 개발, 논문, 스택 학습 기록.">
  <link rel="stylesheet" href="../../assets/css/pixel-system.css">
  <style>
    .page-header { padding: var(--gap-xl) 0 var(--gap-lg); border-bottom: 2px solid var(--border-mid); margin-bottom: var(--gap-xl); }
    .page-title { margin-bottom: var(--gap-sm); }
    .page-desc { font-size: 14px; color: var(--text-muted); }
    .search-bar { position: relative; margin-bottom: var(--gap-lg); }
    .search-bar input { padding-left: 40px; }
    .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 14px; pointer-events: none; }
    .controls { display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: var(--gap-md); margin-bottom: var(--gap-lg); }
    .count-text { font-family: var(--font-pixel); font-size: 9px; color: var(--text-muted); }
    .til-list { display: flex; flex-direction: column; gap: var(--gap-md); }
    .til-item { background: var(--bg-surface); border: 2px solid var(--border-warm); border-radius: 4px; padding: var(--gap-lg); cursor: pointer; transition: all var(--transition); position: relative; }
    .til-item::after { content: ''; position: absolute; bottom: -3px; right: -3px; width: 100%; height: 100%; background: var(--border-warm); border-radius: 4px; z-index: -1; }
    .til-item:hover { border-color: var(--gold-dim); transform: translate(-1px, -1px); }
    .til-item:hover::after { background: var(--gold-dim); }
    .til-item-header { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--gap-md); margin-bottom: var(--gap-sm); }
    .til-item-title { font-family: var(--font-pixel); font-size: 12px; color: var(--cream); line-height: 1.5; flex: 1; }
    .til-item-meta { display: flex; align-items: center; gap: var(--gap-sm); flex-wrap: wrap; margin-bottom: var(--gap-sm); }
    .til-item-summary { font-size: 13px; color: var(--text-muted); line-height: 1.7; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .til-item-footer { display: flex; align-items: center; justify-content: space-between; margin-top: var(--gap-md); }
    .til-item-date { font-family: var(--font-pixel); font-size: 8px; color: var(--text-muted); }
    .til-detail-overlay { position: fixed; inset: 0; background: rgba(10,10,20,0.9); backdrop-filter: blur(4px); z-index: 200; display: flex; align-items: flex-start; justify-content: center; padding: var(--gap-lg); overflow-y: auto; opacity: 0; pointer-events: none; transition: opacity 0.2s ease; }
    .til-detail-overlay.open { opacity: 1; pointer-events: all; }
    .til-detail { background: var(--bg-surface); border: 2px solid var(--border-warm); border-radius: 4px; width: 100%; max-width: 720px; padding: var(--gap-xl); box-shadow: 6px 6px 0 var(--earth-dark); margin: auto; }
    .til-detail-header { display: flex; align-items: flex-start; justify-content: space-between; gap: var(--gap-md); margin-bottom: var(--gap-lg); padding-bottom: var(--gap-lg); border-bottom: 2px solid var(--border-mid); }
    .til-detail-title { font-family: var(--font-pixel); font-size: 14px; color: var(--gold); line-height: 1.5; flex: 1; }
    .notion-link { font-family: var(--font-pixel); font-size: 9px; color: var(--sky-light); text-decoration: none; display: flex; align-items: center; gap: 4px; padding: 4px 8px; border: 1px solid var(--sky-mid); border-radius: 2px; transition: all var(--transition); white-space: nowrap; }
    .notion-link:hover { background: rgba(91,163,208,0.1); color: var(--gold); }
  </style>
</head>
<body>
  <nav class="nav">
    <div class="nav-inner">
      <a href="../../" class="nav-logo">🌾 SRE</a>
      <ul class="nav-links">
        <li><a href="../../">HOME</a></li>
        <li><a href="./" class="active">TIL</a></li>
        <li><a href="../life-os/">BOOKS</a></li>
      </ul>
    </div>
  </nav>

  <div class="page-wrapper">
    <div class="container">
      <div class="page-header">
        <h1 class="page-title">TIL</h1>
        <p class="page-desc">Today I Learned — 개발, 논문, 스택 학습 기록</p>
      </div>

      <!-- 검색 -->
      <div class="search-bar">
        <span class="search-icon">🔍</span>
        <input type="text" class="input" id="search-input" placeholder="검색어를 입력하세요...">
      </div>

      <!-- 필터 탭 -->
      <div class="filter-tabs" id="category-tabs">
        <button class="filter-tab active" data-cat="ALL">ALL</button>
        <button class="filter-tab" data-cat="DEV">DEV</button>
        <button class="filter-tab" data-cat="PAPER">PAPER</button>
        <button class="filter-tab" data-cat="STACK">STACK</button>
      </div>

      <!-- 컨트롤 -->
      <div class="controls">
        <span class="count-text" id="count-text">0개</span>
        <select class="input select" id="sort-select" style="width:auto;font-family:var(--font-pixel);font-size:9px;">
          <option value="date">최신순</option>
          <option value="title">제목순</option>
        </select>
      </div>

      <!-- TIL 목록 -->
      <div id="til-list" class="til-list"></div>
    </div>

    <footer class="footer">
      <div class="container">
        <p class="footer-text">🌾 Self-Refining Engine · Powered by Notion + GitHub Pages</p>
      </div>
    </footer>
  </div>

  <button class="scroll-top" id="scroll-top" onclick="window.scrollTo({top:0,behavior:'smooth'})">↑</button>

  <!-- TIL 상세 모달 -->
  <div class="til-detail-overlay" id="til-detail-overlay">
    <div class="til-detail" id="til-detail-content">
      <div class="til-detail-header">
        <h2 class="til-detail-title" id="detail-title"></h2>
        <div style="display:flex;gap:8px;align-items:center;flex-shrink:0;">
          <a href="#" class="notion-link" id="detail-notion-link" target="_blank">📝 노션에서 보기</a>
          <button class="modal-close" onclick="closeDetail()">✕</button>
        </div>
      </div>
      <div id="detail-meta" style="display:flex;gap:8px;flex-wrap:wrap;margin-bottom:var(--gap-lg);"></div>
      <div id="detail-body" class="prose"></div>
    </div>
  </div>

  <script>
    // ── 상태 ──
    let allItems = [];
    let currentCat = 'ALL';
    let currentSort = 'date';
    let searchQuery = '';

    const CATEGORY_BADGE = { 'DEV': 'badge-dev', 'PAPER': 'badge-paper', 'STACK': 'badge-stack' };

    function formatDate(iso) {
      if (!iso) return '';
      const d = new Date(iso);
      return d.getFullYear() + '.' + String(d.getMonth()+1).padStart(2,'0') + '.' + String(d.getDate()).padStart(2,'0');
    }

    // ── 필터/정렬 ──
    function getFiltered() {
      let items = [...allItems];
      if (currentCat !== 'ALL') items = items.filter(i => i.category === currentCat);
      if (searchQuery) {
        const q = searchQuery.toLowerCase();
        items = items.filter(i =>
          (i.title || '').toLowerCase().includes(q) ||
          (i.summary || '').toLowerCase().includes(q) ||
          (i.tags || []).some(t => t.toLowerCase().includes(q))
        );
      }
      if (currentSort === 'date') items.sort((a,b) => new Date(b.date||b.created||0) - new Date(a.date||a.created||0));
      else items.sort((a,b) => (a.title||'').localeCompare(b.title||''));
      return items;
    }

    // ── 렌더 ──
    function render() {
      const items = getFiltered();
      const container = document.getElementById('til-list');
      document.getElementById('count-text').textContent = items.length + '개';

      if (items.length === 0) {
        if (allItems.length === 0) {
          container.innerHTML = `
            <div class="empty-state">
              <span class="empty-icon">🌱</span>
              <p class="empty-title">아직 TIL이 없어요</p>
              <p class="empty-desc">노션 TIL 데이터베이스에 글을 작성하고 Published를 체크하면<br>자동으로 여기에 나타납니다.</p>
              <a href="https://notion.so" target="_blank" class="btn btn-primary">노션에서 작성하기</a>
            </div>`;
        } else {
          container.innerHTML = `
            <div class="empty-state">
              <span class="empty-icon">🔍</span>
              <p class="empty-title">검색 결과가 없어요</p>
              <p class="empty-desc">다른 키워드나 카테고리로 검색해보세요.</p>
            </div>`;
        }
        return;
      }

      container.innerHTML = items.map(item => {
        const badgeClass = CATEGORY_BADGE[item.category] || 'badge-dev';
        const tags = (item.tags || []).slice(0, 4).map(t => `<span class="tag">${t}</span>`).join('');
        return `
          <div class="til-item" onclick="openDetail('${item.id}')">
            <div class="til-item-header">
              <div class="til-item-title">${item.title}</div>
            </div>
            <div class="til-item-meta">
              <span class="badge ${badgeClass}">${item.category || 'DEV'}</span>
              ${tags}
            </div>
            ${item.summary ? `<p class="til-item-summary">${item.summary}</p>` : ''}
            <div class="til-item-footer">
              <span class="til-item-date">${formatDate(item.date || item.created)}</span>
            </div>
          </div>`;
      }).join('');
    }

    // ── 상세 모달 ──
    function openDetail(id) {
      const item = allItems.find(i => i.id === id);
      if (!item) return;
      document.getElementById('detail-title').textContent = item.title;
      const badgeClass = CATEGORY_BADGE[item.category] || 'badge-dev';
      const tags = (item.tags || []).map(t => `<span class="tag">${t}</span>`).join('');
      document.getElementById('detail-meta').innerHTML =
        `<span class="badge ${badgeClass}">${item.category || 'DEV'}</span>${tags}<span style="font-family:var(--font-pixel);font-size:8px;color:var(--text-muted);margin-left:auto;">${formatDate(item.date || item.created)}</span>`;
      const notionLink = document.getElementById('detail-notion-link');
      if (item.url) { notionLink.href = item.url; notionLink.style.display = 'flex'; }
      else { notionLink.style.display = 'none'; }
      const body = document.getElementById('detail-body');
      if (item.content) {
        body.innerHTML = markdownToHtml(item.content);
      } else if (item.summary) {
        body.innerHTML = `<p>${item.summary}</p>`;
      } else {
        body.innerHTML = '<p style="color:var(--text-muted)">노션에서 내용을 확인하세요.</p>';
      }
      document.getElementById('til-detail-overlay').classList.add('open');
      document.body.style.overflow = 'hidden';
      // URL 파라미터 업데이트
      history.pushState(null, '', '?id=' + id);
    }

    function closeDetail() {
      document.getElementById('til-detail-overlay').classList.remove('open');
      document.body.style.overflow = '';
      history.pushState(null, '', location.pathname);
    }

    // ── 간단한 마크다운 → HTML ──
    function markdownToHtml(md) {
      return md
        .replace(/^### (.+)$/gm, '<h3>$1</h3>')
        .replace(/^## (.+)$/gm, '<h2>$1</h2>')
        .replace(/^# (.+)$/gm, '<h1>$1</h1>')
        .replace(/```(\w*)\n([\s\S]*?)```/gm, '<pre><code class="lang-$1">$2</code></pre>')
        .replace(/`([^`]+)`/g, '<code>$1</code>')
        .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
        .replace(/^---$/gm, '<hr>')
        .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
        .replace(/\*(.+?)\*/g, '<em>$1</em>')
        .replace(/^- (.+)$/gm, '<li>$1</li>')
        .replace(/(<li>.*<\/li>)/gs, '<ul>$1</ul>')
        .replace(/\n\n/g, '</p><p>')
        .replace(/^(?!<[hupbcl])(.+)$/gm, '<p>$1</p>')
        .replace(/<p><\/p>/g, '');
    }

    // ── 이벤트 ──
    document.querySelectorAll('.filter-tab').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentCat = btn.dataset.cat;
        render();
      });
    });

    document.getElementById('search-input').addEventListener('input', e => {
      searchQuery = e.target.value.trim();
      render();
    });

    document.getElementById('sort-select').addEventListener('change', e => {
      currentSort = e.target.value;
      render();
    });

    document.getElementById('til-detail-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) closeDetail();
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape') closeDetail();
    });

    window.addEventListener('scroll', () => {
      document.getElementById('scroll-top').classList.toggle('visible', window.scrollY > 300);
    });

    // ── 데이터 로드 ──
    async function loadData() {
      try {
        const res = await fetch('../../data/til.json');
        const data = await res.json();
        allItems = data.items || [];
        render();
        // URL 파라미터로 특정 항목 열기
        const params = new URLSearchParams(location.search);
        const id = params.get('id');
        if (id) openDetail(id);
      } catch(err) {
        allItems = [];
        render();
      }
    }

    loadData();
  </script>
</body>
</html>
